name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Lint
        run: npm run lint
      - name: Unit + integration tests (mocked adapters, no network)
        run: npm test
        env:
          OPENAGENT_ADAPTER: mock
      - name: CLI smoke test
        run: |
          node packages/cli/src/cli.js validate microtasks/example_manifest.json
          node packages/cli/src/cli.js index . --out /tmp/index_snapshot.json
          node packages/cli/src/cli.js run --manifest microtasks/example_manifest.json --workspace . --dry-run
        shell: bash

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Dependency audit
        run: npm audit --audit-level=high || true
